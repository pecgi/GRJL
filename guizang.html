<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>规脏 · Prompt 卡片</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface-hover: #fafaf8;
      --text: #1a1a1a;
      --text-sub: #888;
      --border: #e8e8e6;
      --accent: #2d2d2d;
      --tag-bg: #f0f0ee;
      --star-color: #f5a623;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 40px 40px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }
    .header-left .tag {
      font-size: .7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 12px;
    }
    .header-left h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .header-left h1 span { color: var(--text-sub); }
    .header-left p {
      margin-top: 10px;
      font-size: .88rem;
      color: var(--text-sub);
      line-height: 1.7;
      max-width: 480px;
    }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .total-stars {
      font-size: .8rem;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .total-stars strong {
      color: var(--text);
      font-size: 1.1rem;
    }
    .update-time {
      font-size: .75rem;
      color: #aaa;
    }
    .header-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      color: var(--text-sub);
      text-decoration: none;
      padding: 6px 0;
      transition: color .15s;
    }
    .header-back:hover { color: var(--text); }

    .divider {
      max-width: 820px;
      margin: 0 auto 40px;
      height: 1px;
      background: var(--border);
    }

    /* ── Section titles ── */
    .section {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 40px 72px;
    }
    .section-title {
      font-size: .7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Prompt Cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--border);
    }
    .prompt-card {
      background: var(--surface);
      padding: 24px 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: background .15s;
      position: relative;
    }
    .prompt-card:hover { background: var(--surface-hover); }
    .prompt-card:hover .card-arrow { opacity: 1; transform: translate(2px, -2px); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-name {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }
    .card-stars {
      font-size: .75rem;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-stars svg { color: var(--star-color); }
    .card-desc {
      font-size: .8rem;
      color: var(--text-sub);
      line-height: 1.65;
    }
    .card-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }
    .kw {
      font-size: .68rem;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text-sub);
      background: var(--tag-bg);
    }
    .card-arrow {
      font-size: .85rem;
      color: var(--text-sub);
      opacity: 0;
      transition: opacity .15s, transform .15s;
      margin-top: 4px;
    }

    /* ── Update History ── */
    .timeline {
      border-left: 1px solid var(--border);
      padding-left: 28px;
      margin-left: 8px;
    }
    .timeline-item {
      position: relative;
      padding-bottom: 28px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -34px;
      top: 5px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--bg);
    }
    .timeline-item.active::before { background: var(--text); }
    .timeline-date {
      font-size: .72rem;
      color: #aaa;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .timeline-repo {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .timeline-desc {
      font-size: .78rem;
      color: var(--text-sub);
      line-height: 1.55;
    }

    /* ── Loading / Error states ── */
    .loading { text-align: center; padding: 60px; color: var(--text-sub); font-size: .85rem; }
    .error-msg { text-align: center; padding: 40px; color: #e55; font-size: .82rem; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: .75rem;
      color: #ccc;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      header { padding: 36px 24px 24px; flex-direction: column; align-items: flex-start; }
      .header-right { align-items: flex-start; }
      .section { padding: 0 24px 60px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="tag">AI · Prompt · Claude Code Skill</div>
    <h1>规脏 <span>/</span> Prompt 卡片</h1>
    <p>收录 op7418 的优质 Prompt 与 AI 工具，按 Star 数排序。GitHub 更新自动同步。</p>
  </div>
  <div class="header-right">
    <a href="./index.html" class="header-back">← 返回主页</a>
    <div class="total-stars">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="#f5a623"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <strong id="total-stars">—</strong> Stars
    </div>
    <div class="update-time" id="update-time">加载中…</div>
  </div>
</header>

<div class="divider"></div>

<!-- ── Prompt Cards ── -->
<div class="section">
  <div class="section-title">Prompt 卡片 · Cards</div>
  <div id="cards-container">
    <div class="loading">正在加载卡片数据…</div>
  </div>
</div>

<!-- ── Update History ── -->
<div class="section">
  <div class="section-title">更新历史 · Updates</div>
  <div id="timeline-container">
    <div class="loading">正在加载更新记录…</div>
  </div>
</div>

<footer>pecgi · 规脏 Prompt 卡片 · 数据来源 GitHub</footer>

<script>
const GITHUB_USER = 'op7418';
const REPO_API = `https://api.github.com/users/${GITHUB_USER}/repos?sort=stargazers&per_page=30&type=owner`;

const cardsContainer = document.getElementById('cards-container');
const timelineContainer = document.getElementById('timeline-container');
const totalStarsEl = document.getElementById('total-stars');
const updateTimeEl = document.getElementById('update-time');

// Repo metadata: description, keywords, URL
// 手动补充中文描述，优先级高于 GitHub API 返回的 description
const REPO_META = {
  'guizang-s-prompt': {
    desc: '这里是歸藏的提示词储存库，存放归藏撰写的所有 AI 模型提示词，持续更新。',
    keywords: ['Prompt', '提示词', '合集'],
    url: 'https://github.com/op7418/guizang-s-prompt'
  },
  'guizang-ppt-skill': {
    desc: 'Claude Code Skill，将 Prompt 转换为横向滑动杂志风 HTML 演示文稿。10 种布局、5 种主题、WebGL 背景，单文件输出。',
    keywords: ['Claude Code', 'PPT', '演示', '杂志风'],
    url: 'https://github.com/op7418/guizang-ppt-skill'
  },
  'Document-illustrator-skill': {
    desc: 'Claude Code Skill，将文档转化为插画风格的视觉呈现，生成可分享的单文件 HTML。',
    keywords: ['Claude Code', '文档', '插画', '可视化'],
    url: 'https://github.com/op7418/Document-illustrator-skill'
  },
  'CodePilot': {
    desc: 'AI 代码领航助手，辅助代码审查与重构建议，提升开发效率。',
    keywords: ['代码', 'AI', '辅助'],
    url: 'https://github.com/op7418/CodePilot'
  },
  'Youtube-clipper-skill': {
    desc: 'Claude Code Skill，一键提取 YouTube 视频精华片段，自动生成字幕与时间戳。',
    keywords: ['Claude Code', 'YouTube', '视频', '剪辑'],
    url: 'https://github.com/op7418/Youtube-clipper-skill'
  }
};

function formatDate(isoStr) {
  const d = new Date(isoStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function timeAgo(isoStr) {
  const now = Date.now();
  const then = new Date(isoStr).getTime();
  const diff = now - then;
  const days = Math.floor(diff / 86400000);
  if (days === 0) return '今天';
  if (days === 1) return '昨天';
  if (days < 30) return `${days} 天前`;
  const months = Math.floor(days / 30);
  if (months < 12) return `${months} 个月前`;
  return `${Math.floor(months/12)} 年前`;
}

function renderCards(repos) {
  let totalStars = 0;
  const html = repos.map(repo => {
    const meta = REPO_META[repo.name] || {};
    totalStars += repo.stargazers_count || 0;
    const desc = meta.desc || repo.description || '暂无描述';
    const keywords = meta.keywords || [];
    const url = meta.url || repo.html_url;
    return `
      <a class="prompt-card" href="${url}" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-name">${repo.name}</div>
          <div class="card-stars">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            ${repo.stargazers_count.toLocaleString()}
          </div>
        </div>
        <div class="card-desc">${desc}</div>
        ${keywords.length ? `
        <div class="card-keywords">
          ${keywords.map(k => `<span class="kw">${k}</span>`).join('')}
        </div>` : ''}
        <div class="card-arrow">↗</div>
      </a>`;
  }).join('');

  cardsContainer.innerHTML = `<div class="card-grid">${html}</div>`;
  totalStarsEl.textContent = totalStars.toLocaleString();
}

function renderTimeline(repos) {
  const sorted = [...repos].sort((a,b) => new Date(b.pushed_at) - new Date(a.pushed_at)).slice(0, 10);
  const html = sorted.map((repo, i) => `
    <div class="timeline-item${i === 0 ? ' active' : ''}">
      <div class="timeline-date">${timeAgo(repo.pushed_at)} · ${formatDate(repo.pushed_at)}</div>
      <div class="timeline-repo">${repo.name}</div>
      <div class="timeline-desc">${REPO_META[repo.name]?.desc || repo.description || '—'}</div>
    </div>`).join('');

  timelineContainer.innerHTML = `<div class="timeline">${html}</div>`;
  updateTimeEl.textContent = `更新于 ${formatDate(sorted[0]?.pushed_at)}`;
}

async function load() {
  try {
    const resp = await fetch(REPO_API);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const repos = await resp.json();
    renderCards(repos);
    renderTimeline(repos);
  } catch(e) {
    cardsContainer.innerHTML = `<div class="error-msg">加载失败：${e.message}。请检查网络或代理设置。</div>`;
    timelineContainer.innerHTML = `<div class="error-msg">加载失败：${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
