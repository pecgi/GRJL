<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月历 · 日记</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-sub: #999;
      --border: #ebebeb;
      --primary: #5c6bc0;
      --primary-light: #e8eaf6;
      --green: #16a34a;
      --green-light: #dcfce7;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
    }

    /* ── 顶栏 ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .top-left { display: flex; align-items: center; gap: 16px; }
    .back-link {
      display: flex; align-items: center; gap: 5px;
      color: var(--text-sub); font-size: .85rem;
      text-decoration: none; transition: color .15s;
    }
    .back-link:hover { color: var(--text); }
    .page-title { font-size: 1.1rem; font-weight: 700; }

    /* 月份切换 */
    .month-nav {
      display: flex; align-items: center; gap: 12px;
    }
    .nav-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; color: var(--text-sub);
      transition: background .15s, color .15s;
    }
    .nav-btn:hover { background: #f3f4f6; color: var(--text); }
    .month-label { font-size: .95rem; font-weight: 600; min-width: 90px; text-align: center; }

    /* ── 主体 ── */
    .main {
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* 统计栏 */
    .stat-row {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 28px;
      font-size: .88rem; color: var(--text-sub);
    }
    .stat-item strong { color: var(--text); font-size: 1.1rem; margin-right: 3px; }
    .stat-coverage { color: var(--primary); font-weight: 700; font-size: 1rem; }

    /* ── 日历 ── */
    /* 星期标题 */
    .week-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }
    .week-header span {
      text-align: center;
      font-size: .75rem;
      color: var(--text-sub);
      padding: 4px 0;
      font-weight: 500;
    }

    /* 日期网格 */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 8px 6px 6px;
      cursor: pointer;
      transition: border-color .15s, transform .1s, box-shadow .15s;
      position: relative;
      overflow: hidden;
      min-height: 72px;
    }
    .day-cell:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(92,107,192,.12);
    }
    .day-cell.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
      pointer-events: none;
    }
    .day-cell.today {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .day-cell.has-entry {
      border-color: #86efac;
      background: var(--green-light);
    }
    .day-cell.has-entry:hover {
      border-color: var(--green);
      box-shadow: 0 4px 12px rgba(22,163,74,.12);
    }
    .day-cell.future {
      opacity: .35;
      cursor: default;
      pointer-events: none;
    }

    /* 日期数字 */
    .day-num {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
      align-self: flex-start;
    }
    .day-cell.today .day-num {
      color: var(--primary);
    }
    .day-cell.has-entry .day-num {
      color: var(--green);
    }

    /* 日记预览（最多2行） */
    .day-preview {
      font-size: .68rem;
      color: #6b7280;
      line-height: 1.4;
      width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      text-align: left;
      word-break: break-all;
    }
    .day-cell.has-entry .day-preview {
      color: #15803d;
    }

    /* 打点标记 */
    .day-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      position: absolute;
      bottom: 6px; right: 7px;
    }

    /* ── 详情抽屉 ── */
    .drawer-mask {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(3px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .drawer-mask.open { display: flex; }

    .drawer {
      background: #fff;
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 780px;
      max-height: 75vh;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUp .25s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .drawer-handle {
      width: 36px; height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-date {
      font-size: 1rem; font-weight: 700;
    }
    .drawer-date .drawer-weekday {
      font-size: .8rem; font-weight: 400;
      color: var(--text-sub); margin-left: 8px;
    }
    .drawer-actions { display: flex; gap: 8px; }
    .btn-write {
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 16px; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-write:hover { background: #3949ab; }
    .btn-close {
      background: #f3f4f6; color: var(--text-sub);
      border: none; border-radius: 8px;
      padding: 7px 12px; font-size: .85rem;
      cursor: pointer; transition: background .15s;
    }
    .btn-close:hover { background: #e5e7eb; }

    .drawer-body {
      padding: 20px 24px 28px;
      overflow-y: auto;
      flex: 1;
    }

    .entry-title {
      font-size: 1.05rem; font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }
    .entry-body {
      font-size: .95rem; line-height: 1.8;
      color: #374151;
      white-space: pre-wrap;
    }
    .entry-empty {
      text-align: center;
      padding: 32px 0;
      color: var(--text-sub);
      font-size: .9rem;
    }
    .entry-empty p { margin-bottom: 16px; }

    @media (max-width: 600px) {
      .top-bar { padding: 12px 16px; }
      .main { padding: 20px 14px 60px; }
      .day-cell { min-height: 56px; padding: 6px 4px 4px; }
      .day-num { font-size: .8rem; }
      .day-preview { font-size: .62rem; -webkit-line-clamp: 1; }
      .drawer { max-height: 80vh; }
    }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div class="top-bar">
  <div class="top-left">
    <a class="back-link" href="./diary.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      日记
    </a>
    <div class="page-title" id="page-title"></div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<!-- 主体 -->
<div class="main">
  <div class="stat-row" id="stat-row"></div>
  <div class="week-header">
    <span>日</span><span>一</span><span>二</span><span>三</span>
    <span>四</span><span>五</span><span>六</span>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- 详情抽屉 -->
<div class="drawer-mask" id="drawer-mask" onclick="handleMaskClick(event)">
  <div class="drawer" id="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <div class="drawer-date">
        <span id="drawer-date-text"></span>
        <span class="drawer-weekday" id="drawer-weekday"></span>
      </div>
      <div class="drawer-actions">
        <button class="btn-write" id="btn-write" onclick="goWrite()">✏️ 写日记</button>
        <button class="btn-close" onclick="closeDrawer()">关闭</button>
      </div>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
//  数据
// ──────────────────────────────────────────────
const STORAGE_KEY = 'diary_entries_v1';
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { entries: {} };
  } catch(e) { return { entries: {} }; }
}

// ──────────────────────────────────────────────
//  日期工具
// ──────────────────────────────────────────────
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const MONTHS   = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

const todayObj = new Date();
const todayStr = fmtDate(todayObj);

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysInMonth(y, m) {
  return new Date(y, m, 0).getDate();
}
function firstDayOfWeek(y, m) {
  return new Date(y, m-1, 1).getDay(); // 0=Sun
}

// ──────────────────────────────────────────────
//  状态
// ──────────────────────────────────────────────
let curYear, curMonth;

// 从 URL 读初始年月
const params = new URLSearchParams(location.search);
const paramY = parseInt(params.get('year'));
const paramM = parseInt(params.get('month'));
curYear  = paramY  || todayObj.getFullYear();
curMonth = paramM  || todayObj.getMonth() + 1;

// ──────────────────────────────────────────────
//  渲染月历
// ──────────────────────────────────────────────
function render() {
  const data = loadData();
  const entries = data.entries;
  const total = daysInMonth(curYear, curMonth);
  const firstDow = firstDayOfWeek(curYear, curMonth);
  const isCurMonth = (curYear === todayObj.getFullYear() && curMonth === todayObj.getMonth()+1);
  const pastDays = isCurMonth ? todayObj.getDate() : (curYear*100+curMonth < todayObj.getFullYear()*100+todayObj.getMonth()+1 ? total : 0);

  // 标题
  document.getElementById('page-title').textContent = `${curYear} 年 ${MONTHS[curMonth-1]}`;
  document.getElementById('month-label').textContent = `${curYear} / ${String(curMonth).padStart(2,'0')}`;

  // 统计
  let count = 0;
  for (let d = 1; d <= total; d++) {
    const ds = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (entries[ds]) count++;
  }
  const base = pastDays > 0 ? pastDays : total;
  const pct = base > 0 ? Math.round(count / base * 100) : 0;
  document.getElementById('stat-row').innerHTML = `
    <span><strong>${count}</strong> 篇</span>
    <span>/</span>
    <span>${base > 0 ? base : total} 天</span>
    <span class="stat-coverage">${pct}%</span>
  `;

  // 日历格
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // 空白占位（本月第一天之前）
  for (let i = 0; i < firstDow; i++) {
    const blank = document.createElement('div');
    blank.className = 'day-cell empty';
    grid.appendChild(blank);
  }

  // 每一天
  for (let d = 1; d <= total; d++) {
    const ds = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = entries[ds];
    const isToday = ds === todayStr;
    const isFuture = ds > todayStr;

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (entry)    cell.classList.add('has-entry');
    if (isToday)  cell.classList.add('today');
    if (isFuture) cell.classList.add('future');

    // 日期数字
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    // 预览文字
    if (entry) {
      const preview = document.createElement('div');
      preview.className = 'day-preview';
      preview.textContent = entry.title || entry.body || '';
      cell.appendChild(preview);

      const dot = document.createElement('div');
      dot.className = 'day-dot';
      cell.appendChild(dot);
    }

    cell.onclick = () => openDrawer(ds);
    grid.appendChild(cell);
  }
}

// ──────────────────────────────────────────────
//  月份切换
// ──────────────────────────────────────────────
function changeMonth(delta) {
  curMonth += delta;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  render();
  // 同步 URL（不刷页）
  const url = new URL(location.href);
  url.searchParams.set('year', curYear);
  url.searchParams.set('month', curMonth);
  history.replaceState(null, '', url);
}

// ──────────────────────────────────────────────
//  抽屉
// ──────────────────────────────────────────────
let activeDate = '';

function openDrawer(dateStr) {
  activeDate = dateStr;
  const data = loadData();
  const entry = data.entries[dateStr] || null;

  const d = new Date(dateStr + 'T00:00:00');
  const friendly = `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
  document.getElementById('drawer-date-text').textContent = friendly;
  document.getElementById('drawer-weekday').textContent = WEEKDAYS[d.getDay()];

  // 写日记按钮文案
  document.getElementById('btn-write').textContent = entry ? '✏️ 编辑' : '✏️ 写日记';

  // 内容区
  const body = document.getElementById('drawer-body');
  if (entry && (entry.title || entry.body)) {
    body.innerHTML = `
      ${entry.title ? `<div class="entry-title">${escHtml(entry.title)}</div>` : ''}
      <div class="entry-body">${escHtml(entry.body || '')}</div>
    `;
  } else {
    body.innerHTML = `
      <div class="entry-empty">
        <p>这一天还没有日记～</p>
      </div>
    `;
  }

  document.getElementById('drawer-mask').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer-mask').classList.remove('open');
}

function handleMaskClick(e) {
  if (e.target === document.getElementById('drawer-mask')) closeDrawer();
}

function goWrite() {
  window.location.href = `./diary-write.html?date=${activeDate}`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ──────────────────────────────────────────────
//  初始化
// ──────────────────────────────────────────────
render();
</script>
</body>
</html>
