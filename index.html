<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的工具箱</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-sub: #888;
      --border: #ebebeb;
      --accent: #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 64px 40px 48px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .site-label {
      font-size: .78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      color: var(--text);
    }

    header p {
      margin-top: 14px;
      font-size: 1rem;
      color: var(--text-sub);
      line-height: 1.7;
      max-width: 480px;
    }

    /* ── Divider ── */
    .divider {
      width: calc(100% - 80px);
      max-width: 820px;
      margin: 0 auto 40px;
      height: 1px;
      background: var(--border);
    }

    /* ── Section ── */
    .section {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 40px 80px;
      flex: 1;
    }

    .section-title {
      font-size: .72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 20px;
    }

    /* ── Tool Grid ── */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--border);
    }

    .tool-card {
      background: var(--surface);
      padding: 28px 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background .15s;
      position: relative;
    }

    .tool-card:hover {
      background: #f5f5f5;
    }

    .tool-card:hover .card-arrow {
      opacity: 1;
      transform: translate(2px, -2px);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .card-arrow {
      font-size: .9rem;
      color: var(--text-sub);
      opacity: 0;
      transition: opacity .15s, transform .15s;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-desc {
      font-size: .82rem;
      color: var(--text-sub);
      line-height: 1.6;
    }

    .card-tag {
      display: inline-block;
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: .7rem;
      color: var(--text-sub);
      margin-top: 4px;
      width: fit-content;
    }

    /* Coming Soon card */
    .tool-card.coming-soon {
      opacity: .45;
      cursor: default;
      pointer-events: none;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: .78rem;
      color: #ccc;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      header { padding: 48px 24px 36px; }
      .divider { width: calc(100% - 48px); }
      .section { padding: 0 24px 60px; }
      .tool-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="site-label">My Toolbox</div>
  <h1>我的<br>个人工具箱</h1>
  <p>记录生活、整理信息的小工具集合。<br>简单好用，数据都在本地。</p>
</header>

<div class="divider"></div>

<div class="section">
  <div class="section-title">工具列表 · Tools</div>

  <div class="tool-grid">

    <!-- 订阅管理 -->
    <a class="tool-card" href="./subscriptions.html">
      <div class="card-top">
        <div class="card-icon">📋</div>
        <div class="card-arrow">↗</div>
      </div>
      <div class="card-name">订阅管理</div>
      <div class="card-desc">记录小报童、知识星球等订阅内容，统计月费年费，追踪到期时间。</div>
      <div class="card-tag">记录 · 统计</div>
    </a>

    <!-- 占位工具 2 -->
    <div class="tool-card coming-soon">
      <div class="card-top">
        <div class="card-icon">📖</div>
      </div>
      <div class="card-name">读书记录</div>
      <div class="card-desc">记录读过的书，写下笔记与感悟。</div>
      <div class="card-tag">即将上线</div>
    </div>

    <!-- 占位工具 3 -->
    <div class="tool-card coming-soon">
      <div class="card-top">
        <div class="card-icon">✅</div>
      </div>
      <div class="card-name">习惯打卡</div>
      <div class="card-desc">追踪每日习惯，建立连续打卡记录。</div>
      <div class="card-tag">即将上线</div>
    </div>

    <!-- 占位工具 4 -->
    <div class="tool-card coming-soon">
      <div class="card-top">
        <div class="card-icon">💰</div>
      </div>
      <div class="card-name">消费记录</div>
      <div class="card-desc">简单记录日常支出，掌握消费习惯。</div>
      <div class="card-tag">即将上线</div>
    </div>

  </div>
</div>

<footer>pecgi · 个人工具箱</footer>

</body>
</html>
