<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生活数字记录</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-sub: #888;
      --border: #ebebeb;
      --primary: #5c6bc0;
      --primary-dark: #3949ab;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ════════════════════════════════
       登录界面
    ════════════════════════════════ */
    #auth-screen {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }
    .auth-logo {
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-card h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      text-align: center;
      font-size: .85rem;
      color: var(--text-sub);
      margin-bottom: 28px;
    }
    .btn-auth-github {
      width: 100%;
      padding: 13px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: #fff;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color .15s, background .15s;
      margin-bottom: 18px;
    }
    .btn-auth-github:hover { border-color: #333; background: #fafafa; }
    .auth-divider {
      text-align: center;
      color: var(--text-sub);
      font-size: .82rem;
      margin-bottom: 18px;
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 35%;
      height: 1px;
      background: #eee;
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .82rem; color: var(--text-sub); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus { border-color: var(--primary); }
    .btn-auth-email {
      width: 100%; padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }
    .btn-auth-email:hover { background: var(--primary-dark); }
    .auth-msg { font-size: .82rem; color: #e53935; margin-top: 10px; text-align: center; min-height: 20px; }
    .auth-msg.success { color: #43a047; }
    .auth-toggle { text-align: center; font-size: .82rem; color: var(--text-sub); margin-top: 16px; }
    .auth-toggle a { color: var(--primary); cursor: pointer; text-decoration: none; }
    .auth-toggle a:hover { text-decoration: underline; }

    /* ════════════════════════════════
       主界面（模块选择）
    ════════════════════════════════ */
    #app-screen { display: none; min-height: 100vh; flex-direction: column; }

    header {
      padding: 48px 40px 36px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .header-left .site-label {
      font-size: .75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 10px;
    }
    .header-left h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    .header-left h1 span { color: var(--primary); }
    .header-left p {
      margin-top: 10px;
      font-size: .9rem;
      color: var(--text-sub);
      line-height: 1.7;
    }
    .user-area {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 600;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: .88rem; color: var(--text-sub); }
    .btn-logout {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .8rem;
      color: var(--text-sub);
      cursor: pointer;
      transition: border-color .15s;
    }
    .btn-logout:hover { border-color: #999; color: var(--text); }

    .divider {
      width: calc(100% - 80px);
      max-width: 820px;
      margin: 0 auto 36px;
      height: 1px;
      background: var(--border);
    }

    .section {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 40px 80px;
      flex: 1;
    }
    .section-title {
      font-size: .72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 20px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--border);
    }
    .tool-card {
      background: var(--surface);
      padding: 28px 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background .15s;
      position: relative;
    }
    .tool-card:hover { background: #f5f5f5; }
    .tool-card:hover .card-arrow { opacity: 1; transform: translate(2px, -2px); }
    .card-top { display: flex; align-items: center; justify-content: space-between; }
    .card-icon { font-size: 1.6rem; line-height: 1; }
    .card-arrow { font-size: .9rem; color: var(--text-sub); opacity: 0; transition: opacity .15s, transform .15s; }
    .card-name { font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .card-desc { font-size: .82rem; color: var(--text-sub); line-height: 1.6; }
    .card-tag {
      display: inline-block;
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: .7rem;
      color: var(--text-sub);
      margin-top: 4px;
      width: fit-content;
    }
    .card-tag.active { border-color: #c5cae9; color: var(--primary); background: #f3f4fd; }
    .tool-card.coming-soon { opacity: .45; cursor: default; pointer-events: none; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: .78rem;
      color: #ccc;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      header { padding: 36px 24px 24px; flex-direction: column; align-items: flex-start; gap: 16px; }
      .divider { width: calc(100% - 48px); }
      .section { padding: 0 24px 60px; }
      .tool-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── 登录界面 ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🗂️</div>
    <h1>生活数字记录</h1>
    <p class="auth-subtitle">登录后，你的数据将自动同步到云端</p>

    <button class="btn-auth-github" onclick="loginWithGitHub()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      使用 GitHub 登录
    </button>

    <div class="auth-divider">或使用邮箱</div>

    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="auth-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="auth-password" placeholder="至少6位" onkeydown="if(event.key==='Enter')handleEmailAuth()" />
    </div>
    <button class="btn-auth-email" onclick="handleEmailAuth()" id="btn-email-auth">登录</button>
    <div class="auth-msg" id="auth-msg"></div>
    <div class="auth-toggle">
      <span id="auth-toggle-text">还没有账号？</span>
      <a onclick="toggleAuthMode()">立即注册</a>
    </div>
  </div>
</div>

<!-- ── 主界面（模块选择）── -->
<div id="app-screen">
  <header>
    <div class="header-left">
      <div class="site-label">Life · Digital · Records</div>
      <h1>生活<span>数字</span>记录</h1>
      <p>把日常里值得留存的东西，好好收起来。</p>
    </div>
    <div class="user-area">
      <div class="user-avatar" id="user-avatar">👤</div>
      <span class="user-name" id="user-name"></span>
      <button class="btn-logout" onclick="handleLogout()">退出</button>
    </div>
  </header>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">模块 · Modules</div>
    <div class="tool-grid">

      <a class="tool-card" href="./subscriptions.html">
        <div class="card-top">
          <div class="card-icon">📦</div>
          <div class="card-arrow">↗</div>
        </div>
        <div class="card-name">订阅管理</div>
        <div class="card-desc">记录小报童、知识星球、软件订阅等，统计月费年费，追踪到期时间。</div>
        <div class="card-tag active">已上线</div>
      </a>

      <div class="tool-card coming-soon">
        <div class="card-top">
          <div class="card-icon">🤖</div>
        </div>
        <div class="card-name">Prompt 卡片</div>
        <div class="card-desc">收集整理常用的 AI 提示词，分类管理，随用随取。</div>
        <div class="card-tag">即将上线</div>
      </div>

      <div class="tool-card coming-soon">
        <div class="card-top">
          <div class="card-icon">📝</div>
        </div>
        <div class="card-name">笔记摘抄</div>
        <div class="card-desc">记录读书、文章里的好句子，附上出处和感想，慢慢积累。</div>
        <div class="card-tag">即将上线</div>
      </div>

    </div>
  </div>

  <footer>pecgi · 生活数字记录</footer>
</div>

<script>
const SUPABASE_URL = 'https://qknojxdhdjqjdoqjdnyu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrbm9qeGRoZGpxamRvcWpkbnl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mzg2ODAsImV4cCI6MjA5MDExNDY4MH0.8BnUklTASBnzgZgu-_hbcVNoZ_LcUcLCR_9P5y8PWjo';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let isLoginMode = true;

// ── 登录方法 ──
async function loginWithGitHub() {
  // 明确跳回首页（index.html），而不是当前页
  const origin = window.location.origin;
  const base = window.location.pathname.replace(/\/[^/]*$/, '/');
  const redirectTo = origin + base + 'index.html';
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'github',
    options: { redirectTo }
  });
  if (error) showMsg('登录失败：' + error.message);
}

function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('btn-email-auth').textContent = isLoginMode ? '登录' : '注册';
  document.getElementById('auth-toggle-text').textContent = isLoginMode ? '还没有账号？' : '已有账号？';
  document.querySelector('.auth-toggle a').textContent = isLoginMode ? '立即注册' : '去登录';
  document.getElementById('auth-msg').textContent = '';
}

async function handleEmailAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) { showMsg('请填写邮箱和密码'); return; }
  if (password.length < 6) { showMsg('密码至少6位'); return; }

  const btn = document.getElementById('btn-email-auth');
  btn.textContent = '处理中…'; btn.disabled = true;

  let result;
  if (isLoginMode) {
    result = await sb.auth.signInWithPassword({ email, password });
  } else {
    result = await sb.auth.signUp({ email, password });
  }

  btn.textContent = isLoginMode ? '登录' : '注册';
  btn.disabled = false;

  if (result.error) {
    showMsg(result.error.message);
  } else if (!isLoginMode && !result.data?.session) {
    showMsg('注册成功！请检查邮箱完成验证后登录。', true);
  }
}

async function handleLogout() {
  await sb.auth.signOut();
}

function showMsg(text, success = false) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-msg' + (success ? ' success' : '');
}

// ── 登录状态监听 ──
let sessionChecked = false;

sb.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    showApp(session.user);
  } else if (sessionChecked) {
    // 只有初始检查完毕后的状态变化（比如退出）才显示登录页
    showAuth();
  }
});

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  sessionChecked = true;
  if (session?.user) {
    showApp(session.user);
  } else {
    showAuth();
  }
})();

function showApp(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';

  const name = user.user_metadata?.user_name || user.user_metadata?.name || user.email?.split('@')[0] || '用户';
  document.getElementById('user-name').textContent = name;
  const avatarEl = document.getElementById('user-avatar');
  const avatarUrl = user.user_metadata?.avatar_url;
  if (avatarUrl) {
    avatarEl.innerHTML = `<img src="${avatarUrl}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    avatarEl.textContent = name[0].toUpperCase();
  }
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}
</script>
</body>
</html>
