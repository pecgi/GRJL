<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>写日记 · 生活数字记录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --text-sub: #aaa;
      --text-placeholder: #ccc;
      --border: #e8e8e8;
      --primary: #5c6bc0;
      --primary-dark: #3949ab;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶栏 ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-link {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-sub); font-size: .85rem;
      text-decoration: none;
      transition: color .15s;
      cursor: pointer;
      background: none; border: none; padding: 0;
    }
    .back-link:hover { color: var(--text); }

    .top-actions { display: flex; align-items: center; gap: 10px; }

    .btn-discard {
      background: none; border: none;
      color: var(--text-sub); font-size: .88rem;
      cursor: pointer; padding: 8px 14px; border-radius: 8px;
      transition: background .15s, color .15s;
    }
    .btn-discard:hover { background: #f3f4f6; color: var(--text); }

    .btn-save {
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      padding: 9px 22px; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: background .15s, transform .1s;
    }
    .btn-save:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-save:active { transform: translateY(0); }
    .btn-save:disabled { background: #c7cbe8; cursor: not-allowed; transform: none; }

    /* ── 写作区 ── */
    .editor-wrap {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 28px 80px;
    }

    /* 日期选择 */
    .date-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .date-display {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1.5px solid transparent;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .date-display:hover {
      border-color: var(--border);
      background: #fff;
    }
    .date-display .weekday {
      font-size: .8rem;
      font-weight: 400;
      color: var(--text-sub);
      margin-left: 6px;
    }
    .date-input-hidden {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    /* 标题输入 */
    .title-input {
      width: 100%;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      line-height: 1.3;
      margin-bottom: 20px;
      font-family: inherit;
      overflow: hidden;
    }
    .title-input::placeholder { color: var(--text-placeholder); }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .body-input {
      width: 100%;
      min-height: 420px;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    .body-input::placeholder { color: var(--text-placeholder); }

    .word-count {
      text-align: right;
      font-size: .78rem;
      color: var(--text-placeholder);
      margin-top: 16px;
      user-select: none;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1a1a1a; color: #fff;
      padding: 10px 22px; border-radius: 100px;
      font-size: .88rem; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 保存中遮罩 */
    .saving-mask {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,255,255,.6);
      z-index: 300;
      align-items: center; justify-content: center;
      font-size: .95rem; color: var(--primary); font-weight: 600;
    }
    .saving-mask.show { display: flex; }

    @media (max-width: 600px) {
      .top-bar { padding: 12px 16px; }
      .editor-wrap { padding: 32px 20px 60px; }
      .title-input { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div class="top-bar">
  <button class="back-link" onclick="handleBack()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    日记
  </button>
  <div class="top-actions">
    <button class="btn-discard" onclick="handleDiscard()">放弃</button>
    <button class="btn-save" id="btn-save" onclick="handleSave()">保存</button>
  </div>
</div>

<!-- 写作区 -->
<div class="editor-wrap">
  <div class="date-row">
    <div class="date-display" id="date-display">
      <span id="date-text"></span>
      <span class="weekday" id="weekday-text"></span>
      <input class="date-input-hidden" type="date" id="date-picker" onchange="onDateChange()" />
    </div>
  </div>

  <textarea
    class="title-input"
    id="title-input"
    placeholder="标题（可选）"
    rows="1"
    oninput="autoResize(this); updateWordCount()"
    onkeydown="if(event.key==='Enter'){ event.preventDefault(); document.getElementById('body-input').focus(); }"
  ></textarea>

  <div class="divider"></div>

  <textarea
    class="body-input"
    id="body-input"
    placeholder="今天发生了什么……"
    oninput="updateWordCount()"
  ></textarea>

  <div class="word-count" id="word-count">0 字</div>
</div>

<div class="toast" id="toast"></div>
<div class="saving-mask" id="saving-mask">保存中…</div>

<script>
// ────────────────────────────────────────────
//  Supabase 配置（原生 fetch 方案）
// ────────────────────────────────────────────
const SUPABASE_URL  = 'https://qknojxdhdjqjdoqjdnyu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrbm9qeGRoZGpxamRvcWpkbnl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMwMDQ4NjAsImV4cCI6MjA1ODU4MDg2MH0.6fMBDFmSIOQqAXOQZFl5OxQ7kvwsTKrRHr0KfUuajvI';

function getToken() {
  try {
    const ref = SUPABASE_URL.split('//')[1].split('.')[0];
    const key = `sb-${ref}-auth-token`;
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.expires_at && parsed.expires_at * 1000 < Date.now()) return null;
    return parsed.access_token || null;
  } catch(e) { return null; }
}

function isLoggedIn() { return !!getToken(); }

// Supabase REST 请求封装
async function sbRequest(method, path, body) {
  const token = getToken();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=minimal',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  return res;
}

// ────────────────────────────────────────────
//  本地缓存（离线备用）
// ────────────────────────────────────────────
const STORAGE_KEY = 'diary_entries_v1';

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { entries: {} };
  } catch(e) { return { entries: {} }; }
}

function saveLocal(date, entry) {
  const data = loadLocal();
  data.entries[date] = entry;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ────────────────────────────────────────────
//  日期工具
// ────────────────────────────────────────────
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

function todayStr() {
  return fmtDate(new Date());
}

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function friendlyDate(str) {
  const d = parseDate(str);
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(d); target.setHours(0,0,0,0);
  const diff = (today - target) / 86400000;
  const base = `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
  if (diff === 0) return { date: base, week: WEEKDAYS[d.getDay()] + ' · 今天' };
  if (diff === 1) return { date: base, week: WEEKDAYS[d.getDay()] + ' · 昨天' };
  return { date: base, week: WEEKDAYS[d.getDay()] };
}

// ────────────────────────────────────────────
//  初始化
// ────────────────────────────────────────────
let currentDate = '';

async function initPage() {
  if (!isLoggedIn()) {
    window.location.replace('./index.html');
    return;
  }

  const params = new URLSearchParams(location.search);
  currentDate = params.get('date') || todayStr();

  // 先从本地缓存载入，再尝试从云端获取最新
  const local = loadLocal();
  let entry = local.entries[currentDate] || {};

  document.getElementById('title-input').value = entry.title || '';
  document.getElementById('body-input').value  = entry.body  || '';
  autoResize(document.getElementById('title-input'));
  updateDateDisplay();
  updateWordCount();

  // 异步从云端拉取最新内容
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/diary_entries?date=eq.${currentDate}&select=title,body,saved_at`,
      {
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${getToken()}`,
        }
      }
    );
    if (res.ok) {
      const rows = await res.json();
      if (rows && rows.length > 0) {
        const cloud = rows[0];
        entry = { title: cloud.title || '', body: cloud.body || '', savedAt: cloud.saved_at };
        // 用云端内容更新本地缓存
        saveLocal(currentDate, entry);
        // 更新编辑器（仅当用户还没开始编辑时）
        const titleEl = document.getElementById('title-input');
        const bodyEl  = document.getElementById('body-input');
        if (!titleEl.value && !bodyEl.value) {
          titleEl.value = entry.title || '';
          bodyEl.value  = entry.body  || '';
          autoResize(titleEl);
          updateWordCount();
        }
      }
    }
  } catch(e) {
    // 网络异常，忽略，用本地缓存
  }

  // 聚焦正文
  const bodyEl = document.getElementById('body-input');
  bodyEl.focus();
  const len = bodyEl.value.length;
  bodyEl.setSelectionRange(len, len);
}

function updateDateDisplay() {
  const { date, week } = friendlyDate(currentDate);
  document.getElementById('date-text').textContent = date;
  document.getElementById('weekday-text').textContent = week;
  document.getElementById('date-picker').value = currentDate;
}

async function onDateChange() {
  const picker = document.getElementById('date-picker');
  if (!picker.value) return;
  currentDate = picker.value;

  // 先显示本地缓存
  const local = loadLocal();
  let entry = local.entries[currentDate] || {};
  document.getElementById('title-input').value = entry.title || '';
  document.getElementById('body-input').value  = entry.body  || '';
  autoResize(document.getElementById('title-input'));
  updateDateDisplay();
  updateWordCount();

  // 再从云端刷新
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/diary_entries?date=eq.${currentDate}&select=title,body,saved_at`,
      {
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${getToken()}`,
        }
      }
    );
    if (res.ok) {
      const rows = await res.json();
      if (rows && rows.length > 0) {
        const cloud = rows[0];
        document.getElementById('title-input').value = cloud.title || '';
        document.getElementById('body-input').value  = cloud.body  || '';
        autoResize(document.getElementById('title-input'));
        updateWordCount();
        saveLocal(currentDate, { title: cloud.title || '', body: cloud.body || '', savedAt: cloud.saved_at });
      }
    }
  } catch(e) {}
}

// ────────────────────────────────────────────
//  字数统计
// ────────────────────────────────────────────
function updateWordCount() {
  const title = document.getElementById('title-input').value;
  const body  = document.getElementById('body-input').value;
  const total = (title + body).replace(/\s/g, '').length;
  document.getElementById('word-count').textContent = total > 0 ? `${total} 字` : '0 字';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ────────────────────────────────────────────
//  保存（云端 + 本地）
// ────────────────────────────────────────────
async function handleSave() {
  const title = document.getElementById('title-input').value.trim();
  const body  = document.getElementById('body-input').value.trim();

  if (!body && !title) {
    showToast('请先写点什么 ✏️');
    return;
  }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  document.getElementById('saving-mask').classList.add('show');

  const entry = { title, body, savedAt: new Date().toISOString() };

  // 先存本地缓存（离线也能用）
  saveLocal(currentDate, entry);

  try {
    // 写入 Supabase（upsert 方式：存在则更新，不存在则插入）
    const res = await sbRequest('POST', 'diary_entries', {
      date: currentDate,
      title: title,
      body: body,
      saved_at: entry.savedAt,
    });

    document.getElementById('saving-mask').classList.remove('show');
    btn.disabled = false;

    if (res.ok || res.status === 201 || res.status === 204) {
      showToast('已保存 ✓');
      setTimeout(() => { window.location.href = './diary.html'; }, 800);
    } else {
      const errText = await res.text();
      console.error('Save error:', res.status, errText);
      showToast('云端保存失败，已存本地');
      setTimeout(() => { window.location.href = './diary.html'; }, 1200);
    }
  } catch(e) {
    document.getElementById('saving-mask').classList.remove('show');
    btn.disabled = false;
    showToast('网络异常，已存本地');
    setTimeout(() => { window.location.href = './diary.html'; }, 1200);
  }
}

// ────────────────────────────────────────────
//  放弃 / 返回
// ────────────────────────────────────────────
function handleDiscard() {
  const body  = document.getElementById('body-input').value.trim();
  const title = document.getElementById('title-input').value.trim();
  if (body || title) {
    if (!confirm('放弃这篇日记？内容不会被保存。')) return;
  }
  window.location.href = './diary.html';
}

function handleBack() {
  const body  = document.getElementById('body-input').value.trim();
  const title = document.getElementById('title-input').value.trim();
  const local = loadLocal();
  const entry = local.entries[currentDate] || {};
  const unchanged = (title === (entry.title||'')) && (body === (entry.body||''));
  if (!unchanged && (body || title)) {
    if (!confirm('有未保存的内容，确定离开？')) return;
  }
  window.location.href = './diary.html';
}

// ────────────────────────────────────────────
//  Toast
// ────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ────────────────────────────────────────────
//  快捷键 Ctrl+S / Cmd+S
// ────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    handleSave();
  }
});

// 启动
initPage();
</script>
</body>
</html>
